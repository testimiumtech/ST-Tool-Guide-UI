<div
  *ngIf="isOpen()"
  class="search-modal-overlay"
  (click)="closeModal.emit()"
>
  <div class="search-modal-content" (click)="$event.stopPropagation()">
    <!-- Header -->
    <div class="modal-header">
      <h2>Search Commands</h2>
      <p>Find documentation for any command or API</p>
    </div>

    <!-- Search Input -->
    <div class="modal-search">
      <input
        type="text"
        [value]="searchQuery()"
        (input)="onSearchInput($event)"
        placeholder="Type to search..."
        class="search-input"
        aria-label="Search commands"
        autofocus
      />
    </div>

    <!-- Results -->
    <div class="modal-results">
      <div *ngIf="filteredCommands().length === 0" class="empty-state">
        <p>
          {{ searchQuery() ? 'No commands found' : 'Start typing to search...' }}
        </p>
      </div>

      <button
        *ngFor="let command of filteredCommands(); trackBy: trackByCommand"
        (click)="selectCommand(command)"
        class="result-button"
      >
        <div class="flex items-center gap-2">
          <div class="result-title">{{ command.title }}</div>
          <span class="text-xs font-medium px-2 py-1 rounded-full bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400">
            {{ command.category }}
          </span>
          <span *ngIf="command.is_new" class="text-xs font-bold px-2 py-1 rounded-full bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400">
            NEW
          </span>
        </div>
        <div class="result-description">
          {{ command.description }}
        </div>
      </button>
    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <button
        (click)="closeModal.emit()"
        class="px-4 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-800 rounded-lg transition-colors"
      >
        Close (ESC)
      </button>
    </div>
  </div>
</div>
