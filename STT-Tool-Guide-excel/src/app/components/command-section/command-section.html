<section class="mb-8 md:mb-12">
  <h2 [attr.id]="sectionId" class="text-xl md:text-2xl font-bold text-gray-900 dark:text-white mb-6 flex items-center gap-3 scroll-mt-24">
    <svg class="w-6 h-6 text-blue-600 dark:text-blue-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="iconPath" />
    </svg>
    <span>{{ title }}</span>
  </h2>
  <ng-content></ng-content>
</section>
