<section class="command-section" appScrollReveal>
  <h2 [attr.id]="sectionId" class="command-section-title scroll-mt-24">
    <span class="section-icon" *ngIf="iconPath">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="iconPath" />
      </svg>
    </span>
    <span>{{ title }}</span>
  </h2>
  <div class="command-section-body">
    <ng-content></ng-content>
  </div>
</section>
