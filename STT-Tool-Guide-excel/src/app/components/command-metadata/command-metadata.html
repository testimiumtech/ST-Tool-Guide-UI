<div class="flex flex-wrap items-center gap-2 sm:gap-3 mb-6">
  <span
  class="inline-flex items-center gap-1.5 px-2 py-1 text-xs sm:px-3 sm:py-1.5 font-bold rounded-full bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300"
  [ngClass]="{
    'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400': isNew
  }"
>
    <svg *ngIf="isNew" class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
      <path fill-rule="evenodd" d="M12.316 3.051a1 1 0 01.633 1.265l-4 12a1 1 0 11-1.898-.632l4-12a1 1 0 011.265-.633zM5.707 6.293a1 1 0 010 1.414L3.414 10l2.293 2.293a1 1 0 11-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0zm8.586 0a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 11-1.414-1.414L16.586 10l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd" />
    </svg>
    {{ isNew ? 'NEW' : 'COMMAND' }}
  </span>
  <span class="inline-block px-3 py-1.5 text-xs font-semibold rounded-full bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400">{{ category }}</span>
  <span *ngIf="lastUpdated" class="text-xs text-gray-500 dark:text-gray-400 ml-0 mt-2 w-full sm:ml-auto sm:mt-0 sm:w-auto">Updated {{ lastUpdated }}</span>
</div>

<div class="flex flex-wrap items-center gap-3 pt-6 border-t border-gray-200 dark:border-slate-700" *ngIf="keywords.length > 0">
  <!-- <span class="text-sm font-semibold text-gray-700 dark:text-gray-300">Keywords:</span>
  <div class="flex flex-wrap gap-2">
    <span
      *ngFor="let keyword of keywords; trackBy: trackByKeyword"
      class="px-2.5 py-1 text-xs bg-gray-100 dark:bg-slate-800 text-gray-700 dark:text-gray-300 rounded-full hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors cursor-pointer"
    >
      {{ keyword }}
    </span>
  </div> -->
</div>
