<header class="header">
  <div class="header-container">
    <!-- Logo & Product Name -->
    <div class="logo-section">
      <a routerLink="/" class="brand-link" aria-label="Go to home page">
        <img src="logo.png" alt="STT logo" class="logo-image" />
      </a>
      <div>
        <a routerLink="/" class="brand-link brand-text-link" aria-label="Go to home page">
          <h1 class="product-name">STT</h1>
        </a>
        <p class="product-tagline">Command Reference</p>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="search-section">
      <button (click)="openSearch()" class="search-bar" aria-label="Search commands">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
          />
        </svg>
        <span>Search commands...</span>
      </button>
    </div>

    <!-- Right Actions -->
    <div class="actions-section">
      <!-- Home Button -->
      <a routerLink="/" class="home-btn" aria-label="Go to home page">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
          />
        </svg>
      </a>

      <!-- Mobile Search Button -->
      <button (click)="openSearch()" class="mobile-search-btn" aria-label="Search commands">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
          />
        </svg>
      </button>

      <!-- Settings Menu with Dropdown -->
      <div class="settings-dropdown" #settingsDropdown>
        <button
          (click)="toggleSettings()"
          class="settings-btn"
          [attr.aria-expanded]="settingsOpen()"
          aria-label="Open settings menu"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
            />
          </svg>
        </button>

        <!-- Settings Dropdown Menu -->
        <div *ngIf="settingsOpen()" class="settings-menu">
          <!-- Theme Toggle Option -->
          <button
            (click)="toggleTheme(); closeSettings()"
            class="settings-menu-item theme-item"
          >
            <svg
              *ngIf="themeService.theme() === 'light'"
              class="w-4 h-4"
              fill="currentColor"
              viewBox="0 0 20 20"
            >
              <path
                d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"
              />
            </svg>
            <svg
              *ngIf="themeService.theme() === 'dark'"
              class="w-4 h-4"
              fill="currentColor"
              viewBox="0 0 20 20"
            >
              <path
                fill-rule="evenodd"
                d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm0 6a3 3 0 100 6 3 3 0 000-6zm0 1a2 2 0 110 4 2 2 0 010-4zm0-8a1 1 0 011 1v1a1 1 0 11-2 0V2a1 1 0 011-1zm6 8a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-12 0a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm12-6a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm-12 0a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1z"
                clip-rule="evenodd"
              />
            </svg>
            <span>{{ themeService.theme() === "light" ? "Dark" : "Light" }} Mode</span>
          </button>

          <!-- Divider -->
          <div class="settings-menu-divider"></div>

          <!-- Prerequisites Link -->
          <a
            routerLink="/prerequisites/excel"
            (click)="closeSettings()"
            class="settings-menu-item"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              />
            </svg>
            <span>Prerequisites</span>
          </a>

          <!-- Documentation Link -->
          <a
            href=""
            target="_blank"
            rel="noopener noreferrer"
            (click)="closeSettings()"
            class="settings-menu-item"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 6.253v13m0-13C6.5 6.253 2 10.998 2 17s4.5 10.747 10 10.747c5.5 0 10-4.998 10-10.747S17.5 6.253 12 6.253z"
              />
            </svg>
            <span>Documentation</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</header>
